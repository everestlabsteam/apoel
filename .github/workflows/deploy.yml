name: Build & Deploy apoel

on:
  push:
    branches: [main]

env:
  REGISTRY: 100.113.62.14:32000
  IMAGE: 100.113.62.14:32000/apoel

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          args: --accept-routes

      - name: Allow insecure registry
        run: |
          echo '{"insecure-registries":["100.113.62.14:32000"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Build and push to node registry
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy with Helm
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          helm upgrade --install apoel ./chart \
            --namespace apoel \
            --create-namespace \
            --set image.tag=${{ github.sha }} \
            --wait \
            --timeout 180s
